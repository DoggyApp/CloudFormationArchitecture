AWSTemplateFormatVersion: "2010-09-09"
Description: EKS stack which creates EKS cluster and worker groups 

Parameters:
#Env Parameters
  Email: 
    Type: String
  AWSID:
    Type: String
  OpenAISecret:
    Type: String

#Imported Parameters 
  managerSGid: 
    Type: String
  ec2KeyId: 
    Type: String 
  privateSubnet0id: 
    Type: String
  mgmtInstanceRoleArn: 
    Type: String
  mgmtInstanceRole: 
    Type: String
#Stack Parameters 
  volumeType: 
    Type: String
    Default: gp3 
    AllowedValues: 
      - gp2
      - gp3
  disableApiTermination: 
    Type: String 
    Default: True
    AllowedValues: 
      - True
      - False
  ebsOptimized: 
    Type: String 
    Default: True
    AllowedValues: 
      - True
      - False
  imageId:
    Type: String 
    Default: graviton
    AllowedValues:
      - graviton 
      - x86
  instanceSize: 
    Type: String
    Default: large
    AllowedValues: 
      - small 
      - medium 
      - large
#Tag parameters 
  owner: 
    Type: String
  ownerEmail: 
    Type: String
  environment: 
    Type: String
    AllowedValues: 
      - production
      - development
  project: 
    Type: String

Mappings: 
  amiId: 
    us-east-1: 
      graviton: ami-03a45a5ac837f33b7 
      x86: ami-0b5eea76982371e91

  instanceMap: 
    graviton: 
      small: t4g.small
      medium: t4g.medium 
      large: t4g.large
    x84: 
      small: t3.small 
      medium: t4.medium 
      large: t3.large

Resources:
  mgmtKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: doggyApp-mgmt-keyPair
      KeyType: rsa
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-mgmt-keypair"
        - Key: owner
          Value: !Ref owner
        - Key: Environment
          Value: !Ref environment
        - Key: project
          Value: !Ref project

  mgmtLaunchTemplate: 
    Type: AWS::EC2::LaunchTemplate
    Properties: 
      LaunchTemplateData: 
        BlockDeviceMappings: 
          - DeviceName: '/dev/xvda'
            Ebs: 
              DeleteOnTermination: True
              Encrypted: True
              KmsKeyId: !Ref ec2KeyId
              VolumeSize: 20
              VolumeType: !Ref volumeType
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -e

            echo "UserData test ran at $(date)" > /tmp/userdata-test.log

            # Redirect all output to a log file
            exec > /var/log/user-data.log 2>&1

            export CLUSTER_NAME="doggy-app-eks-cluster-0"
            export NODEGROUP_NAME="doggy-app-eks-ng-monitoring"

            aws sts get-caller-identity

            echo "===== USER DATA SCRIPT START ====="

            # Wait for networking
            sleep 15

            echo "[INFO] +++++ Installing kubectl..."
            curl -O https://s3.us-west-2.amazonaws.com/amazon-eks/1.28.5/2024-01-04/bin/linux/arm64/kubectl
            mv kubectl /usr/local/bin/
            chmod +x /usr/local/bin/kubectl

            echo "[INFO] +++++ Installing AWS CLI v2..."
            yum remove -y awscli
            curl "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            ./aws/install

            echo "[INFO] Installing eksctl..."
            curl -LO "https://github.com/eksctl-io/eksctl/releases/download/v0.207.0/eksctl_Linux_arm64.tar.gz"
            tar -xzf eksctl_Linux_arm64.tar.gz
            mv eksctl /usr/local/bin/
            chmod +x /usr/local/bin/eksctl

            echo "[INFO] Creating AWS CLI config directory..."
            mkdir -p /home/ec2-user/.aws /root/.aws
            chown ec2-user:ec2-user /home/ec2-user/.aws

            cat <<EOF > /home/ec2-user/.aws/config
            [default]
            region = us-east-1
            output = json

            [sso-session doggy-session]
            sso_start_url = https://d-90660d7b78.awsapps.com/start
            sso_region = us-east-1
            sso_registration_scopes = sso:account:access

            [profile doggy-admin]
            sso_session = doggy-session
            sso_account_id = 109798190983
            sso_role_name = AdministratorAccess
            region = us-east-1
            output = json
            EOF

            cat <<EOF > /root/.aws/config
            [default]
            region = us-east-1
            output = json
            EOF

            export PATH=$PATH:/usr/local/bin

            # collect kubernetes architecture

            echo '[INFO] +++++ Installing git'
            sudo yum install git -y

            git clone https://github.com/DoggyApp/kubernetesArchitecture.git /home/ec2-user/kubernetesArchitecture

            echo '[INFO] +++++ Installing development tools for py-10'
            sudo yum groupinstall "Development Tools" -y
            
            sudo yum install -y \
              gcc \
              openssl11  \
              openssl11-devel \
              bzip2-devel \
              libffi-devel \
              zlib-devel \
              wget \
              make \
              libuuid-devel \
              sqlite-devel \
              readline-devel \
              xz-devel \
              gdbm-devel \
              tk-devel

            
            sudo wget https://www.python.org/ftp/python/3.10.14/Python-3.10.14.tgz -P /usr/src

            
            sudo tar xzf /usr/src/Python-3.10.14.tgz -C /usr/src

            
            cd /usr/src/Python-3.10.14 
            

            echo '[INFO] ++++++ sudo ./configure --enable-optimizations'
            sudo ./configure --enable-optimizations \
              --with-openssl=/usr \
              CPPFLAGS="-I/usr/include" \
              LDFLAGS="-L/usr/lib64"


            echo '[INFO] ++++++ sudo make -j$(nproc)'
            sudo make -j$(nproc)
            echo '[INFO] ++++++ sudo make install'
            sudo make install

            
            echo 'export AWS_PROFILE=doggy-admin' >> /home/ec2-user/.bashrc
            echo 'export PATH="/usr/local/bin:$PATH"' >> /home/ec2-user/.bashrc

            echo '[INFO] ++++++ python3.10 -m venv /home/ec2-user/py10-ansible-env'
            python3.10 -m venv /home/ec2-user/py10-ansible-env
            
            source /home/ec2-user/py10-ansible-env/bin/activate

            
            pip install --upgrade pip setuptools wheel

            
            pip install ansible boto3 botocore openshift kubernetes pyyaml python-gitlab


            ansible-galaxy collection install kubernetes.core community.general "amazon.aws:>=7.0.0"


            echo "setadmin() {
                (
                  cd /home/ec2-user/kubernetesArchitecture/ansible || return 1
                  source /home/ec2-user/py10-ansible-env/bin/activate
                  ansible-playbook \\
                    -i inventory/hosts.yaml \\
                    playbooks/setadmin.yaml -vvv
                )
              }" \
              >> /home/ec2-user/.bashrc

            echo "setupgit() {
                (
                  cd /home/ec2-user/kubernetesArchitecture/ansible || return 1
                  source /home/ec2-user/py10-ansible-env/bin/activate
                  ansible-playbook \\
                    -i inventory/hosts.yaml \\
                    playbooks/setupgit.yaml \\
                    -e 'aws_id=109798190983' -vvv
                )
              }" \
              >> /home/ec2-user/.bashrc

            echo "setupkube() {
                (
                  cd /home/ec2-user/kubernetesArchitecture/ansible || return 1
                  source /home/ec2-user/py10-ansible-env/bin/activate
                  ansible-playbook \\
                    -i inventory/hosts.yaml \\
                    playbooks/setupkube.yaml \\
                    -e 'email=idanzigm@gmail.com aws_id=109798190983 openai_secret_arn=arn:aws:secretsmanager:us-east-1:109798190983:secret:openai-key-NSazkz' -vvv
                )
              }" \
              >> /home/ec2-user/.bashrc

            echo "teardown() {
                (
                  cd /home/ec2-user/kubernetesArchitecture/ansible || return 1
                  source /home/ec2-user/py10-ansible-env/bin/activate
                  ansible-playbook \\
                    -i inventory/hosts.yaml \\
                    playbooks/teardown.yaml -vvv
                )
              }" \
              >> /home/ec2-user/.bashrc

            echo "source /home/ec2-user/py10-ansible-env/bin/activate" >> /home/ec2-user/.bashrc

            echo "aws sso login --profile doggy-admin" >> /home/ec2-user/.bashrc
            echo "alias setkube='aws eks update-kubeconfig --region us-east-1 --name doggy-app-eks-cluster-0 --profile doggy-admin'" >> /home/ec2-user/.bashrc

            echo "[INFO] +++++ Bastion provisioning complete."
            echo "[INFO] SSO login required before running setup. After 'aws sso login', run: setup()"
            echo "===== USER DATA SCRIPT END ====="
        DisableApiTermination: !Ref disableApiTermination
        EbsOptimized: !Ref ebsOptimized
        IamInstanceProfile: 
          Arn: !GetAtt mgmtInstanceProfile.Arn
        ImageId: !FindInMap [ amiId, !Ref 'AWS::Region', !Ref imageId] 
        InstanceType: !FindInMap [instanceMap, !Ref imageId, !Ref instanceSize]
        KeyName: !Ref mgmtKeyPair
        MetadataOptions: 
          HttpTokens: required 
        SecurityGroupIds: 
          - !Ref managerSGid
        TagSpecifications: 
            - ResourceType: instance 
              Tags: 
                - Key: Name 
                  Value: !Sub "${AWS::StackName}-management-ec2"
                - Key: owner
                  Value: !Ref owner
                - Key: OwnerEmail 
                  Value: !Ref ownerEmail
                - Key: Environment 
                  Value: !Ref environment 
                - Key: project 
                  Value: !Ref project 


  mgmtInstanceProfile: 
    Type: AWS::IAM::InstanceProfile 
    Properties:
      Roles:
        - !Ref mgmtInstanceRole

  mgmtInstance:
    Type: AWS::EC2::Instance
    DependsOn:
      - mgmtInstanceProfile
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref mgmtLaunchTemplate
        Version: !GetAtt mgmtLaunchTemplate.LatestVersionNumber
      SubnetId: !Ref privateSubnet0id

Outputs:
  mgmtInstanceId:
    Value: !Ref mgmtInstance

  mgmtKeyPairSsmPath:
    Description: SSM path to retrieve the private key - aws ssm get-parameter --name <value> --with-decryption --query Parameter.Value --output text
    Value: !Sub "/ec2/keypair/${mgmtKeyPair.KeyPairId}"

