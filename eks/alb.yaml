# CloudFormationArchitecture/gitlab-alb.yaml
AWSTemplateFormatVersion: '2010-09-09'
Description: ALB that exposes the self-hosted GitLab instance on the bastion

Parameters:
  vpc0id:
    Type: String
  publicSubnet0id:
    Type: String
  publicSubnet1id:
    Type: String
  mgmtInstanceId:
    Type: String
  GitLabALBSecurityGroupId:
    Type: String
  owner:
    Type: String
  environment:
    Type: String
  project:
    Type: String

Resources:

  GitLabTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: doggy-gitlab-tg
      Protocol: HTTP
      Port: 80
      VpcId: !Ref vpc0id
      TargetType: instance
      Targets:
        - Id: !Ref mgmtInstanceId
          Port: 80
      HealthCheckPath: /-/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5

  GitLabALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: doggy-gitlab-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref publicSubnet0id
        - !Ref publicSubnet1id
      SecurityGroups:
        - !Ref GitLabALBSecurityGroupId

  GitLabListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref GitLabALB
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref GitLabTargetGroup

Outputs:
  GitLabALBDns:
    Value: !GetAtt GitLabALB.DNSName
    Description: >
      Use this hostname as your GitLab external URL and as the git remote
      when pushing from your IDE.

  GitLabALBSecurityGroup: 
    Value: !Ref GitLabALBSecurityGroup